<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a9ee4"/>
      <stop offset="1" stop-color="#13548f"/>
    </linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfeefb"/>
      <stop offset="1" stop-color="#9fd8ef"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg2)"/>

  <!-- Carrito (con leve inclinación, como en la foto); reducido y subido para dejar espacio a ANDES -->
  <g transform="translate(30.72,0.72) scale(0.88) rotate(-5 256 280)">
    <!-- Sombra suave -->
    <ellipse cx="252" cy="470" rx="120" ry="18" fill="#0b3a66" opacity="0.25"/>

    <!-- Mástil / estructura trasera -->
    <rect x="300" y="70" width="14" height="370" rx="7" fill="#1c2b3a"/>

    <!-- ===== Tablero superior (display) ===== -->
    <rect x="150" y="58" width="172" height="252" rx="16" fill="#2a3a4d"/>
    <rect x="162" y="70" width="148" height="228" rx="9" fill="#e9eef3"/>

    <!-- Banner rojo superior -->
    <rect x="170" y="78" width="132" height="40" rx="7" fill="#e8412f"/>
    <rect x="182" y="90" width="78" height="6" rx="3" fill="#ffffff"/>
    <rect x="182" y="102" width="60" height="6" rx="3" fill="#ffffff"/>

    <!-- Imagen / escena -->
    <rect x="170" y="124" width="132" height="92" rx="6" fill="url(#scene)"/>
    <circle cx="210" cy="180" r="16" fill="#f4c98a"/>
    <rect x="196" y="192" width="28" height="22" rx="6" fill="#5b8def"/>
    <circle cx="250" cy="186" r="13" fill="#f4c98a"/>
    <rect x="239" y="196" width="22" height="18" rx="5" fill="#7cc6a1"/>
    <rect x="170" y="200" width="132" height="16" fill="#bfe3c9" opacity="0.5"/>

    <!-- Banner rojo inferior + etiqueta JW -->
    <rect x="170" y="224" width="132" height="30" rx="6" fill="#e8412f"/>
    <rect x="180" y="233" width="64" height="5" rx="2.5" fill="#ffffff"/>
    <rect x="180" y="243" width="48" height="5" rx="2.5" fill="#ffffff"/>
    <rect x="270" y="230" width="24" height="18" rx="3" fill="#ffffff"/>
    <text x="282" y="244" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#e8412f" text-anchor="middle">JW</text>

    <!-- Mini imágenes -->
    <rect x="170" y="260" width="63" height="30" rx="5" fill="#9fd8ef"/>
    <rect x="239" y="260" width="63" height="30" rx="5" fill="#bfe3c9"/>

    <!-- ===== Cuerpo con estantes de publicaciones ===== -->
    <rect x="158" y="316" width="156" height="120" rx="12" fill="#2a3a4d"/>

    <!-- Estante 1 -->
    <g>
      <rect x="170" y="328" width="40" height="36" rx="4" fill="#f3f7fa"/>
      <rect x="216" y="328" width="40" height="36" rx="4" fill="#f3f7fa"/>
      <rect x="262" y="328" width="40" height="36" rx="4" fill="#f3f7fa"/>
      <rect x="176" y="336" width="28" height="4" rx="2" fill="#c4d0db"/>
      <rect x="222" y="336" width="28" height="4" rx="2" fill="#c4d0db"/>
      <rect x="268" y="336" width="28" height="4" rx="2" fill="#c4d0db"/>
    </g>
    <!-- Estante 2 -->
    <g>
      <rect x="170" y="372" width="40" height="36" rx="4" fill="#f3f7fa"/>
      <rect x="216" y="372" width="40" height="36" rx="4" fill="#f3f7fa"/>
      <rect x="262" y="372" width="40" height="36" rx="4" fill="#f3f7fa"/>
      <rect x="176" y="380" width="28" height="4" rx="2" fill="#c4d0db"/>
      <rect x="222" y="380" width="28" height="4" rx="2" fill="#c4d0db"/>
      <rect x="268" y="380" width="28" height="4" rx="2" fill="#c4d0db"/>
    </g>

    <!-- ===== Ruedas ===== -->
    <circle cx="196" cy="452" r="26" fill="#1c2b3a"/>
    <circle cx="196" cy="452" r="10" fill="#5b7a99"/>
    <circle cx="284" cy="452" r="26" fill="#1c2b3a"/>
    <circle cx="284" cy="452" r="10" fill="#5b7a99"/>
  </g>
</svg>
